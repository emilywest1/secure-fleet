---
- name: Install and configure NRPE
  hosts: "{{ target_host }}"
  become: true
  gather_facts: true

  vars:
    nrpe_port: 5666
    nrpe_allowed_hosts: "127.0.0.1,::1"
    nrpe_log_facility: "daemon"
    nrpe_pid_file: "/var/run/nagios/nrpe.pid"
    nrpe_user: "nagios"
    nrpe_group: "nagios"

  tasks:

    - name: Install NRPE and Nagios plugins (Debian/Ubuntu)
      ansible.builtin.apt:
        name:
          - nagios-nrpe-server
          - nagios-plugins-basic
          - nagios-plugins-standard
        state: present
        update_cache: true
      when: ansible_os_family == "Debian"

    - name: Set NRPE configuration (Debian/Ubuntu path)
      ansible.builtin.template:
        src: nrpe.cfg.j2
        dest: /etc/nagios/nrpe.cfg
        owner: root
        group: root
        mode: "0644"
      when: ansible_os_family == "Debian"
      notify: Restart NRPE

    - name: Allow NRPE port through UFW (Debian/Ubuntu)
      community.general.ufw:
        rule: allow
        port: "{{ nrpe_port }}"
        proto: tcp
      when: ansible_os_family == "Debian"
      ignore_errors: true

    - name: Enable and start NRPE service (Debian/Ubuntu)
      ansible.builtin.service:
        name: nagios-nrpe-server
        enabled: true
        state: started
      when: ansible_os_family == "Debian"

    - name: Check NRPE is listening on port {{ nrpe_port }}
      ansible.builtin.wait_for:
        port: "{{ nrpe_port }}"
        timeout: 15
      register: nrpe_check

    - name: Report NRPE status
      ansible.builtin.debug:
        msg: "NRPE is up and listening on port {{ nrpe_port }}"
      when: nrpe_check is succeeded

  handlers:
    - name: Restart NRPE
      ansible.builtin.service:
        name: "{{ 'nagios-nrpe-server' if ansible_os_family == 'Debian' else 'nrpe' }}"
        state: restarted